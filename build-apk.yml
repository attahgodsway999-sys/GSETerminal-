name: Build GSE Terminal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create full Android project structure
        run: |
          # Create all required directories
          mkdir -p app/src/main/java/com/gseterminal/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          # Move Kotlin files to correct location
          mv MainActivity.kt      app/src/main/java/com/gseterminal/app/ 2>/dev/null || true
          mv SplashActivity.kt    app/src/main/java/com/gseterminal/app/ 2>/dev/null || true
          mv GSEApplication.kt    app/src/main/java/com/gseterminal/app/ 2>/dev/null || true
          mv WebAppInterface.kt   app/src/main/java/com/gseterminal/app/ 2>/dev/null || true

          # Move XML resources
          mv AndroidManifest.xml         app/src/main/         2>/dev/null || true
          mv activity_main.xml           app/src/main/res/layout/  2>/dev/null || true
          mv activity_splash.xml         app/src/main/res/layout/  2>/dev/null || true
          mv strings.xml                 app/src/main/res/values/  2>/dev/null || true
          mv colors.xml                  app/src/main/res/values/  2>/dev/null || true
          mv themes.xml                  app/src/main/res/values/  2>/dev/null || true
          mv network_security_config.xml app/src/main/res/xml/     2>/dev/null || true
          mv backup_rules.xml            app/src/main/res/xml/     2>/dev/null || true
          mv data_extraction_rules.xml   app/src/main/res/xml/     2>/dev/null || true

          # Move icons
          mv ic_launcher.png       app/src/main/res/mipmap-xxhdpi/ 2>/dev/null || true
          mv ic_launcher_round.png app/src/main/res/mipmap-xxhdpi/ 2>/dev/null || true

          # Copy icons to all densities
          for d in mdpi hdpi xhdpi xxxhdpi; do
            cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png       app/src/main/res/mipmap-$d/ 2>/dev/null || true
            cp app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png app/src/main/res/mipmap-$d/ 2>/dev/null || true
          done

          # Move Gradle files
          mv gradle--wrapper.properties gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true
          mv libs.versions.toml         gradle/                                   2>/dev/null || true

          echo "✅ Directory structure created"
          find app -type f | sort

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -O /tmp/gradle.zip && \
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist && \
          cp /tmp/gradle-dist/gradle-8.7/lib/plugins/gradle-wrapper-*.jar \
            gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

      - name: Write gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSETerminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show result
        run: |
          echo "✅ Build complete!"
          ls -lh app/build/outputs/apk/debug/ || echo "APK not found"
