name: Build GSE Terminal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Show all files in repo
        run: |
          echo "=== ALL FILES IN REPO ==="
          find . -not -path './.git/*' | sort

      - name: Build project structure
        run: |
          mkdir -p app/src/main/java/com/gseterminal/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          # Kotlin source files
          cp MainActivity.kt      app/src/main/java/com/gseterminal/app/ || echo "SKIP MainActivity.kt"
          cp SplashActivity.kt    app/src/main/java/com/gseterminal/app/ || echo "SKIP SplashActivity.kt"
          cp GSEApplication.kt    app/src/main/java/com/gseterminal/app/ || echo "SKIP GSEApplication.kt"
          cp WebAppInterface.kt   app/src/main/java/com/gseterminal/app/ || echo "SKIP WebAppInterface.kt"

          # Android Manifest
          cp AndroidManifest.xml app/src/main/ || echo "SKIP AndroidManifest"

          # Layout files
          cp activity_main.xml   app/src/main/res/layout/ || echo "SKIP activity_main"
          cp activity_splash.xml app/src/main/res/layout/ || echo "SKIP activity_splash"

          # Resource values
          cp strings.xml app/src/main/res/values/ || echo "SKIP strings"
          cp colors.xml  app/src/main/res/values/ || echo "SKIP colors"
          cp themes.xml  app/src/main/res/values/ || echo "SKIP themes"

          # XML configs
          cp network_security_config.xml app/src/main/res/xml/ || echo "SKIP network_security"
          cp backup_rules.xml            app/src/main/res/xml/ || echo "SKIP backup_rules"
          cp data_extraction_rules.xml   app/src/main/res/xml/ || echo "SKIP data_extraction"

          # Web app HTML
          cp index.html app/src/main/assets/ || echo "SKIP index.html"

          # Icons — copy to all densities
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp ic_launcher.png       app/src/main/res/mipmap-$d/ || echo "SKIP icon $d"
            cp ic_launcher_round.png app/src/main/res/mipmap-$d/ || echo "SKIP round icon $d"
          done

          # Gradle wrapper properties — handle both dash variants
          if [ -f "gradle--wrapper.properties" ]; then
            cp gradle--wrapper.properties gradle/wrapper/gradle-wrapper.properties
          elif [ -f "gradle-wrapper.properties" ]; then
            cp gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          else
            cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          fi

          # libs.versions.toml
          cp libs.versions.toml gradle/ || echo "SKIP libs.versions.toml"

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          echo "=== FINAL STRUCTURE ==="
          find app -type f | sort

      - name: Download Gradle wrapper jar
        run: |
          curl -sL "https://github.com/nicowillis/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://github.com/nicowillis/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar || \
          echo "Will use gradlew to bootstrap"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSETerminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
