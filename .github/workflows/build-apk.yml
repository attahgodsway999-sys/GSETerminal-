name: Build GSE Terminal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build project structure
        run: |
          mkdir -p app/src/main/java/com/gseterminal/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          cp MainActivity.kt      app/src/main/java/com/gseterminal/app/
          cp SplashActivity.kt    app/src/main/java/com/gseterminal/app/
          cp GSEApplication.kt    app/src/main/java/com/gseterminal/app/
          cp WebAppInterface.kt   app/src/main/java/com/gseterminal/app/

          cp AndroidManifest.xml         app/src/main/
          cp activity_main.xml           app/src/main/res/layout/
          cp activity_splash.xml         app/src/main/res/layout/
          cp strings.xml                 app/src/main/res/values/
          cp colors.xml                  app/src/main/res/values/
          cp themes.xml                  app/src/main/res/values/
          cp network_security_config.xml app/src/main/res/xml/
          cp backup_rules.xml            app/src/main/res/xml/
          cp data_extraction_rules.xml   app/src/main/res/xml/
          cp index.html                  app/src/main/assets/

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp ic_launcher.png       app/src/main/res/mipmap-$d/
            cp ic_launcher_round.png app/src/main/res/mipmap-$d/
          done

          cp gradle-wrapper.properties gradle/wrapper/
          cp libs.versions.toml        gradle/

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          echo "=== Structure ==="
          find app/src -type f | sort

      - name: Download Gradle wrapper jar
        run: |
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSETerminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
