name: Build GSE Terminal APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.7-bin.zip -d /opt
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Create all directories first
        run: |
          mkdir -p app/src/main/java/com/gseterminal/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper
          echo "✅ All directories created"

      - name: Write Gradle files
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=false
          EOF

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GSETerminal"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace  = "com.gseterminal.app"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.gseterminal.app"
                  minSdk        = 24
                  targetSdk     = 34
                  versionCode   = 1
                  versionName   = "1.0.0"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              buildFeatures { viewBinding = true }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("com.google.android.material:material:1.12.0")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")
              implementation("androidx.webkit:webkit:1.11.0")
          }
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keepattributes JavascriptInterface
          -keepclassmembers class com.gseterminal.app.WebAppInterface { public *; }
          EOF

          echo "✅ Gradle files written"

      - name: Write Kotlin source files
        run: |
          cat > app/src/main/java/com/gseterminal/app/GSEApplication.kt << 'EOF'
          package com.gseterminal.app
          import android.app.Application
          import android.webkit.WebView
          class GSEApplication : Application() {
              override fun onCreate() {
                  super.onCreate()
                  if (BuildConfig.DEBUG) WebView.setWebContentsDebuggingEnabled(true)
              }
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/SplashActivity.kt << 'EOF'
          package com.gseterminal.app
          import android.annotation.SuppressLint
          import android.content.Intent
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import androidx.appcompat.app.AppCompatActivity
          @SuppressLint("CustomSplashScreen")
          class SplashActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_splash)
                  Handler(Looper.getMainLooper()).postDelayed({
                      startActivity(Intent(this, MainActivity::class.java))
                  }, 1800L)
              }
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/WebAppInterface.kt << 'EOF'
          package com.gseterminal.app
          import android.content.Context
          import android.content.Intent
          import android.net.Uri
          import android.webkit.JavascriptInterface
          import android.widget.Toast
          class WebAppInterface(private val context: Context) {
              @JavascriptInterface
              fun showToast(msg: String) {
                  (context as? MainActivity)?.runOnUiThread {
                      Toast.makeText(context, msg, Toast.LENGTH_SHORT).show()
                  }
              }
              @JavascriptInterface
              fun openUrl(url: String) {
                  try {
                      context.startActivity(
                          Intent(Intent.ACTION_VIEW, Uri.parse(url)).apply {
                              addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                          }
                      )
                  } catch (e: Exception) {}
              }
              @JavascriptInterface fun isAndroid(): Boolean = true
              @JavascriptInterface fun getAppVersion(): String = BuildConfig.VERSION_NAME
          }
          EOF

          cat > app/src/main/java/com/gseterminal/app/MainActivity.kt << 'EOF'
          package com.gseterminal.app
          import android.annotation.SuppressLint
          import android.content.Context
          import android.content.Intent
          import android.graphics.Bitmap
          import android.net.ConnectivityManager
          import android.net.NetworkCapabilities
          import android.net.Uri
          import android.os.Bundle
          import android.view.View
          import android.webkit.*
          import android.widget.Toast
          import androidx.activity.OnBackPressedCallback
          import androidx.appcompat.app.AppCompatActivity
          import androidx.webkit.WebSettingsCompat
          import androidx.webkit.WebViewFeature
          import com.gseterminal.app.databinding.ActivityMainBinding
          class MainActivity : AppCompatActivity() {
              private lateinit var binding: ActivityMainBinding
              @SuppressLint("SetJavaScriptEnabled")
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)
                  with(binding.webView) {
                      settings.javaScriptEnabled    = true
                      settings.domStorageEnabled    = true
                      settings.useWideViewPort      = true
                      settings.loadWithOverviewMode = true
                      settings.setSupportZoom(false)
                      if (WebViewFeature.isFeatureSupported(WebViewFeature.SAFE_BROWSING_ENABLE))
                          WebSettingsCompat.setSafeBrowsingEnabled(settings, true)
                      addJavascriptInterface(WebAppInterface(this@MainActivity), "AndroidBridge")
                      webViewClient = object : WebViewClient() {
                          override fun onPageStarted(v: WebView, url: String, f: Bitmap?) {
                              binding.progressBar.visibility = View.VISIBLE
                          }
                          override fun onPageFinished(v: WebView, url: String) {
                              binding.progressBar.visibility = View.GONE
                          }
                          override fun onReceivedError(v: WebView, req: WebResourceRequest, err: WebResourceError) {
                              if (req.isForMainFrame) showOffline()
                          }
                          override fun shouldOverrideUrlLoading(v: WebView, req: WebResourceRequest): Boolean {
                              val url = req.url.toString()
                              return if (url.startsWith("file://") || url.startsWith("about:")) false
                              else if (url.startsWith("http")) {
                                  try { startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url))) } catch (e: Exception) {}
                                  true
                              } else true
                          }
                      }
                      webChromeClient = object : WebChromeClient() {
                          override fun onProgressChanged(v: WebView, p: Int) {
                              binding.progressBar.progress = p
                              if (p == 100) binding.progressBar.visibility = View.GONE
                          }
                      }
                      if (isOnline()) loadUrl("file:///android_asset/index.html")
                      else showOffline()
                  }
                  binding.swipeRefresh.setOnRefreshListener {
                      if (isOnline()) binding.webView.reload()
                      binding.swipeRefresh.isRefreshing = false
                  }
                  onBackPressedDispatcher.addCallback(this, object : OnBackPressedCallback(true) {
                      override fun handleOnBackPressed() {
                          if (binding.webView.canGoBack()) binding.webView.goBack() else finish()
                      }
                  })
              }
              fun retryLoad() {
                  if (isOnline()) {
                      binding.errorLayout.visibility = View.GONE
                      binding.webView.visibility     = View.VISIBLE
                      binding.webView.loadUrl("file:///android_asset/index.html")
                  } else Toast.makeText(this, "Still offline", Toast.LENGTH_SHORT).show()
              }
              private fun showOffline() {
                  binding.webView.visibility     = View.GONE
                  binding.errorLayout.visibility = View.VISIBLE
              }
              private fun isOnline(): Boolean {
                  val cm = getSystemService(Context.CONNECTIVITY_SERVICE) as ConnectivityManager
                  val n  = cm.activeNetwork ?: return false
                  val c  = cm.getNetworkCapabilities(n) ?: return false
                  return c.hasCapability(NetworkCapabilities.NET_CAPABILITY_INTERNET)
              }
              override fun onResume()  { super.onResume();  binding.webView.onResume() }
              override fun onPause()   { super.onPause();   binding.webView.onPause() }
              override fun onDestroy() { binding.webView.destroy(); super.onDestroy() }
          }
          EOF

          echo "✅ Kotlin files written"

      - name: Write Android resources
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:name=".GSEApplication"
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="GSE Terminal"
                  android:theme="@style/Theme.GSETerminal"
                  android:networkSecurityConfig="@xml/network_security_config"
                  android:hardwareAccelerated="true"
                  android:dataExtractionRules="@xml/data_extraction_rules"
                  android:fullBackupContent="@xml/backup_rules"
                  tools:targetApi="31">
                  <activity android:name=".SplashActivity" android:exported="true"
                      android:theme="@style/Theme.GSETerminal.Splash"
                      android:noHistory="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".MainActivity" android:exported="false"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize"
                      android:theme="@style/Theme.GSETerminal.NoActionBar"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#f8fafc">
              <ProgressBar android:id="@+id/progressBar"
                  style="@style/Widget.AppCompat.ProgressBar.Horizontal"
                  android:layout_width="0dp" android:layout_height="3dp"
                  android:max="100" android:progressTint="#059669"
                  android:visibility="gone"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent"/>
              <androidx.swiperefreshlayout.widget.SwipeRefreshLayout
                  android:id="@+id/swipeRefresh"
                  android:layout_width="0dp" android:layout_height="0dp"
                  app:layout_constraintTop_toBottomOf="@id/progressBar"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">
                  <WebView android:id="@+id/webView"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:overScrollMode="never"/>
              </androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
              <LinearLayout android:id="@+id/errorLayout"
                  android:layout_width="0dp" android:layout_height="0dp"
                  android:orientation="vertical" android:gravity="center"
                  android:padding="32dp" android:visibility="gone"
                  android:background="#f8fafc"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="📡" android:textSize="56sp" android:layout_marginBottom="16dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="No Connection" android:textSize="20sp" android:textStyle="bold"
                      android:textColor="#0f172a" android:gravity="center" android:layout_marginBottom="8dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="GSE Terminal needs internet to load live data."
                      android:textSize="14sp" android:textColor="#64748b"
                      android:gravity="center" android:layout_marginBottom="28dp"/>
                  <Button android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Retry" android:onClick="retryLoad"
                      android:backgroundTint="#059669" android:textColor="#ffffff"/>
              </LinearLayout>
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat > app/src/main/res/layout/activity_splash.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#0f172a">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:orientation="vertical" android:gravity="center"
                  app:layout_constraintTop_toTopOf="parent"
                  app:layout_constraintBottom_toBottomOf="parent"
                  app:layout_constraintStart_toStartOf="parent"
                  app:layout_constraintEnd_toEndOf="parent">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="📈" android:textSize="72sp" android:layout_marginBottom="20dp"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="GSE TERMINAL" android:textSize="28sp" android:textStyle="bold"
                      android:textColor="#059669" android:gravity="center"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="Ghana Stock Exchange" android:textSize="13sp"
                      android:textColor="#64748b" android:gravity="center" android:layout_marginTop="6dp"/>
              </LinearLayout>
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">GSE Terminal</string></resources>
          EOF

          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="gse_green">#059669</color>
              <color name="gse_amber">#d97706</color>
          </resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.GSETerminal" parent="Theme.Material3.Light.NoActionBar">
                  <item name="colorPrimary">#059669</item>
                  <item name="android:statusBarColor">#1e293b</item>
                  <item name="android:windowBackground">#f8fafc</item>
              </style>
              <style name="Theme.GSETerminal.NoActionBar" parent="Theme.GSETerminal">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
              <style name="Theme.GSETerminal.Splash" parent="Theme.Material3.Light.NoActionBar">
                  <item name="android:statusBarColor">#0f172a</item>
                  <item name="android:navigationBarColor">#0f172a</item>
                  <item name="android:windowBackground">#0f172a</item>
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors><certificates src="system"/></trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">kwayisi.org</domain>
                  <domain includeSubdomains="true">api.rss2json.com</domain>
                  <domain includeSubdomains="true">api.allorigins.win</domain>
                  <domain includeSubdomains="true">corsproxy.io</domain>
                  <domain includeSubdomains="true">fonts.googleapis.com</domain>
                  <domain includeSubdomains="true">fonts.gstatic.com</domain>
                  <domain includeSubdomains="true">cdnjs.cloudflare.com</domain>
                  <domain includeSubdomains="true">logo.clearbit.com</domain>
                  <domain includeSubdomains="true">www.google.com</domain>
                  <trust-anchors><certificates src="system"/></trust-anchors>
              </domain-config>
              <debug-overrides>
                  <trust-anchors>
                      <certificates src="system"/>
                      <certificates src="user"/>
                  </trust-anchors>
              </debug-overrides>
          </network-security-config>
          EOF

          cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content><exclude domain="cache" path="."/></full-backup-content>
          EOF

          cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup><exclude domain="cache" path="."/></cloud-backup>
              <device-transfer><exclude domain="cache" path="."/></device-transfer>
          </data-extraction-rules>
          EOF

          echo "✅ Resources written"

      - name: Write assets and icons
        run: |
          # HTML asset
          if [ -f "index.html" ]; then
            cp index.html app/src/main/assets/
            echo "✅ index.html copied from repo"
          else
            echo "<html><body style='background:#0f172a;color:#059669;font-family:sans-serif;text-align:center;padding:60px'><h1>📈 GSE Terminal</h1></body></html>" \
              > app/src/main/assets/index.html
            echo "⚠️ Used placeholder index.html"
          fi

          # Icons
          python3 << 'PY'
          from PIL import Image, ImageDraw
          import os

          sizes = [
              ('mipmap-mdpi',    48),
              ('mipmap-hdpi',    72),
              ('mipmap-xhdpi',   96),
              ('mipmap-xxhdpi',  144),
              ('mipmap-xxxhdpi', 192),
          ]

          # Find source icon
          src = None
          for f in ['ic_launcher.png', 'ic_launcher_round.png']:
              if os.path.exists(f):
                  src = Image.open(f).convert('RGBA')
                  print(f"Using icon: {f}")
                  break

          for folder, px in sizes:
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                  fp = f'{path}/{name}'
                  if src:
                      img = src.resize((px, px), Image.LANCZOS)
                  else:
                      img = Image.new('RGB', (px, px), (5, 150, 105))
                      d = ImageDraw.Draw(img)
                  img.save(fp)
              print(f"✅ {folder}: {px}x{px}")

          print("Icons done!")
          PY

          echo "=== Final structure ==="
          find app/src -type f | sort

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GSETerminal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
